# vd provider registry
# ============================================================================
# Machine-usable metadata for every vector database vd knows about. Lifted from
# the report "VectorDB Selection & Setup Guide" (misc/docs/11 -- ...). Loaded by
# vd.providers; see that module for the query/recommend API.
#
# DESIGN RULE (from the report's section 10): hardcode only *structural* facts
# that change on the order of years — pip package names, deployment archetype,
# license, default ports, env-var names, filter-dialect family. Do NOT hardcode
# prices or free-tier limits; they drift monthly. Store the *URL* to the live
# pricing/limits page instead. The `as_of` date below says when this snapshot
# was taken — re-verify volatile facts against the linked pages.
as_of: "2026-05"

providers:

  # ----- vd's own in-process backend (not a third-party product) -----------
  - name: memory
    display_name: In-memory (vd built-in)
    archetype: embedded
    deployment: [embedded]
    requires_server: false
    embedded_mode: true
    managed_free_tier: false
    pip_packages: []
    extras: null
    license: vd (Apache-2.0)
    hybrid_search: false
    filter_dialect: vd canonical (full)
    bulk_export: vd.export_collection
    id_type: str
    default_port: null
    env_vars: []
    scale: prototype
    sweet_spot: "tests, notebooks, <100k vectors — zero setup, no persistence"
    docs:
      install: null
      python_client: null
      filtering: null
      pricing: null
    verify_command: "python -c 'import vd; vd.connect(\"memory\")'"
    notes: "Brute-force cosine in pure Python. Always available. Not persistent."
    adapter: memory

  # ----- Embedded (pip-only, no server) ------------------------------------
  - name: chroma
    display_name: Chroma
    archetype: embedded
    deployment: [embedded, server, managed]
    requires_server: false
    embedded_mode: true
    managed_free_tier: true
    pip_packages: [chromadb]
    extras: null
    license: Apache-2.0
    hybrid_search: partial
    filter_dialect: mongo-ish ($eq, $in, $and, $or)
    bulk_export: paginated collection.get to JSONL
    id_type: str
    default_port: 8000
    env_vars: []
    scale: medium
    sweet_spot: "fastest path to a working RAG demo; local-first AI apps"
    docs:
      install: https://pypi.org/project/chromadb/
      python_client: https://www.trychroma.com/products/chromadb
      filtering: https://docs.trychroma.com/docs/querying-collections/metadata-filtering
      pricing: https://www.trychroma.com/products/chromadb
    verify_command: "python -c 'import chromadb; print(chromadb.Client().heartbeat())'"
    notes: "Telemetry on by default — set ANONYMIZED_TELEMETRY=False. Default embedder is 384-dim."
    adapter: chroma

  - name: lancedb
    display_name: LanceDB
    archetype: embedded
    deployment: [embedded, server, managed]
    requires_server: false
    embedded_mode: true
    managed_free_tier: true
    pip_packages: [lancedb]
    extras: "[clip, embeddings]"
    license: Apache-2.0
    hybrid_search: true
    filter_dialect: SQL WHERE
    bulk_export: copy .lance directory / to_pandas / to Parquet
    id_type: str
    default_port: null
    env_vars: []
    scale: large
    sweet_spot: "embedded + multimodal + cheap S3 store; schema evolution, versioning"
    docs:
      install: https://docs.lancedb.com/quickstart
      python_client: https://lancedb.github.io/lancedb/
      filtering: https://lancedb.github.io/lancedb/sql/
      pricing: https://lancedb.com
    verify_command: "python -c 'import lancedb; print(lancedb.connect(\"/tmp/_vd_lv\").table_names())'"
    notes: "Single-writer per dataset. S3/GCS native via LANCE_* env vars."
    adapter: lancedb

  - name: sqlite_vec
    display_name: sqlite-vec
    archetype: embedded
    deployment: [embedded]
    requires_server: false
    embedded_mode: true
    managed_free_tier: false
    pip_packages: [sqlite-vec]
    extras: null
    license: MIT-OR-Apache-2.0
    hybrid_search: false
    filter_dialect: SQL
    bulk_export: sqlite .dump
    id_type: int-or-str
    default_port: null
    env_vars: []
    scale: medium
    sweet_spot: "the app already uses SQLite; brute-force up to ~1M vectors"
    docs:
      install: https://alexgarcia.xyz/sqlite-vec/installation.html
      python_client: https://alexgarcia.xyz/sqlite-vec/python.html
      filtering: https://alexgarcia.xyz/sqlite-vec/
      pricing: null
    verify_command: "python -c 'import sqlite3,sqlite_vec; d=sqlite3.connect(\":memory:\"); d.enable_load_extension(True); sqlite_vec.load(d); print(d.execute(\"select vec_version()\").fetchone())'"
    notes: "Needs SQLite >=3.41; macOS system python disables extensions — use brew python or pysqlite3-binary."
    adapter: sqlite_vec

  - name: duckdb
    display_name: DuckDB-VSS
    archetype: embedded
    deployment: [embedded]
    requires_server: false
    embedded_mode: true
    managed_free_tier: false
    pip_packages: [duckdb]
    extras: null
    license: MIT
    hybrid_search: false
    filter_dialect: SQL
    bulk_export: "COPY ... TO 'file.parquet'"
    id_type: int-or-str
    default_port: null
    env_vars: []
    scale: medium
    sweet_spot: "analytics + ANN in the same SQL query"
    docs:
      install: https://duckdb.org/docs/stable/core_extensions/vss
      python_client: https://duckdb.org/docs/stable/clients/python/overview
      filtering: https://duckdb.org/docs/stable/sql/query_syntax/where
      pricing: null
    verify_command: "python -c 'import duckdb; c=duckdb.connect(); c.execute(\"INSTALL vss; LOAD vss;\"); print(\"ok\")'"
    notes: "HNSW persistence is experimental — opt in with SET hnsw_enable_experimental_persistence=true."
    adapter: duckdb

  - name: faiss
    display_name: FAISS
    archetype: library
    deployment: [embedded]
    requires_server: false
    embedded_mode: true
    managed_free_tier: false
    pip_packages: [faiss-cpu]
    extras: "faiss-gpu (conda)"
    license: MIT-AND-BSD-3-Clause
    hybrid_search: false
    filter_dialect: none (filter outside the index)
    bulk_export: faiss.write_index + sidecar metadata
    id_type: int-or-str
    default_port: null
    env_vars: []
    scale: large
    sweet_spot: "in-memory benchmark / recall@k baseline / a component inside a system"
    docs:
      install: https://github.com/facebookresearch/faiss/blob/main/INSTALL.md
      python_client: https://github.com/facebookresearch/faiss/wiki/Python-interface
      filtering: null
      pricing: null
    verify_command: "python -c 'import faiss; print(faiss.__version__)'"
    notes: "A library, not a DB. No native metadata filtering — vd filters client-side. No server."
    adapter: faiss

  # ----- Self-hosted server (also managed) ---------------------------------
  - name: qdrant
    display_name: Qdrant
    archetype: server
    deployment: [embedded, server, managed]
    requires_server: false
    embedded_mode: true
    managed_free_tier: true
    pip_packages: [qdrant-client]
    extras: "[fastembed]"
    license: Apache-2.0
    hybrid_search: true
    filter_dialect: payload filters (must/should/must_not)
    bulk_export: snapshot API + scroll
    id_type: uuid-or-uint
    default_port: 6333
    env_vars: [QDRANT_URL, QDRANT_API_KEY]
    scale: large
    sweet_spot: "Rust-fast self-host with a clean Python SDK; same API embedded/Docker/cloud"
    docs:
      install: https://qdrant.tech/documentation/quickstart/
      python_client: https://python-client.qdrant.tech/
      filtering: https://qdrant.tech/documentation/concepts/filtering/
      pricing: https://qdrant.tech/pricing/
    verify_command: "curl -fsS http://localhost:6333/healthz"
    notes: "Permanent free 0.5 vCPU/1 GB cloud cluster. Pin client major to server major."
    adapter: qdrant

  - name: weaviate
    display_name: Weaviate
    archetype: server
    deployment: [embedded, server, managed]
    requires_server: false
    embedded_mode: true
    managed_free_tier: false   # 14-day sandbox only
    pip_packages: [weaviate-client]
    extras: null
    license: BSD-3-Clause
    hybrid_search: true
    filter_dialect: typed Filter builder / GraphQL
    bulk_export: backup/restore API
    id_type: uuid
    default_port: 8080
    env_vars: [WEAVIATE_URL, WEAVIATE_API_KEY]
    scale: large
    sweet_spot: "best-in-class native hybrid search + vectorizer modules"
    docs:
      install: https://docs.weaviate.io/weaviate/quickstart
      python_client: https://docs.weaviate.io/weaviate/client-libraries/python
      filtering: https://docs.weaviate.io/weaviate/api/graphql/filters
      pricing: https://weaviate.io/pricing
    verify_command: "python -c 'import weaviate; c=weaviate.connect_to_local(); print(c.is_ready()); c.close()'"
    notes: "v3 client deprecated; v4.16+ renamed NamedVectors->Vectors. Oct 2025 pricing restructure (Flex $45/mo min)."
    adapter: weaviate

  - name: milvus
    display_name: Milvus / Zilliz
    archetype: server
    deployment: [embedded, server, managed]
    requires_server: false   # Milvus Lite is embedded
    embedded_mode: true
    managed_free_tier: true  # Zilliz free cluster
    pip_packages: [pymilvus]
    extras: "[milvus-lite]"
    license: Apache-2.0
    hybrid_search: true
    filter_dialect: boolean expression language
    bulk_export: milvus-backup tool
    id_type: int-or-str
    default_port: 19530
    env_vars: [MILVUS_URI, MILVUS_TOKEN]
    scale: billion
    sweet_spot: "billion-vector scale; DiskANN keeps RAM bounded"
    docs:
      install: https://milvus.io/docs/install_standalone-docker.md
      python_client: https://milvus.io/docs/install-pymilvus.md
      filtering: https://milvus.io/docs/boolean.md
      pricing: https://zilliz.com/pricing
    verify_command: "curl -fsS http://localhost:9091/healthz"
    notes: "Milvus Lite is Linux/macOS only — not native Windows (use WSL2)."
    adapter: milvus

  - name: redis
    display_name: Redis 8 (Redis Query Engine)
    archetype: server
    deployment: [server, managed]
    requires_server: true
    embedded_mode: false
    managed_free_tier: true
    pip_packages: [redis, redisvl]
    extras: null
    license: AGPLv3-OR-SSPLv1-OR-RSALv2
