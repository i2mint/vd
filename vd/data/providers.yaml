  # ----- Postgres / SQL extensions -----------------------------------------
  - name: pgvector
    display_name: pgvector (Postgres extension)
    archetype: server
    deployment: [server]
    requires_server: true
    embedded_mode: false
    managed_free_tier: false   # depends on the Postgres host
    pip_packages: [pgvector, psycopg]
    extras: "psycopg[binary]"
    license: PostgreSQL-permissive
    hybrid_search: false       # manual SQL hybrid
    filter_dialect: SQL WHERE
    bulk_export: pg_dump
    id_type: int-or-str
    default_port: 5432
    env_vars: [DATABASE_URL, POSTGRES_DSN]
    scale: large
    sweet_spot: "you already run Postgres — no second DB, SQL joins with vectors for free"
    docs:
      install: https://github.com/pgvector/pgvector
      python_client: https://github.com/pgvector/pgvector-python
      filtering: https://github.com/pgvector/pgvector#querying
      pricing: null
    verify_command: "psql -c \"SELECT extversion FROM pg_extension WHERE extname='vector'\""
    notes: "v0.8.2 (Feb 2026) fixes CVE-2026-3172 in parallel HNSW builds — upgrade. Cross to VectorChord at >10M."
    adapter: pgvector

