    id_type: str
    default_port: 6379
    env_vars: [REDIS_URL]
    scale: large
    sweet_spot: "you already run Redis, or need sub-ms KNN on a hot dataset"
    docs:
      install: https://redis.io/docs/latest/operate/oss_and_stack/install/
      python_client: https://github.com/redis/redis-vl-python
      filtering: https://redis.io/docs/latest/develop/ai/search-and-query/query/
      pricing: https://redis.io/pricing/
    verify_command: "redis-cli ping"
    notes: "License changed May 2025 (Redis 8). HNSW index lives in RAM — size accordingly."
    adapter: redis

  - name: elasticsearch
    display_name: Elasticsearch
    archetype: server
    deployment: [server, managed]
    requires_server: true
    embedded_mode: false
