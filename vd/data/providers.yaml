    verify_command: "curl -fsS http://localhost:9200/"
    notes: "ES-compatible. Use the elasticsearch adapter's escape hatch or a dedicated adapter."
    adapter: null

  - name: vespa
    display_name: Vespa
    archetype: server
    deployment: [server, managed]
    requires_server: true
    embedded_mode: false
    managed_free_tier: true   # $300 trial credit
    pip_packages: [pyvespa]
    extras: null
    license: Apache-2.0
    hybrid_search: true
    filter_dialect: YQL + rank profiles
    bulk_export: document API export
    id_type: str
    default_port: 8080
    env_vars: []
    scale: billion
    sweet_spot: "billion-scale hybrid search with custom learning-to-rank"
    docs:
      install: https://docs.vespa.ai/en/vespa-quick-start.html
      python_client: https://pyvespa.readthedocs.io/
      filtering: https://docs.vespa.ai/en/query-language.html
      pricing: https://cloud.vespa.ai/pricing
    verify_command: "curl -fsS http://localhost:8080/state/v1/health"
    notes: "Heavyweight; reach for it only at billion-scale with custom ranking."
    adapter: null

  # ----- Managed-first ------------------------------------------------------
  - name: pinecone
    display_name: Pinecone
    archetype: managed
    deployment: [managed]
    requires_server: false
    embedded_mode: false
    managed_free_tier: true
    pip_packages: [pinecone]        # NOT pinecone-client (deprecated)
    extras: "[asyncio, grpc]"
    license: Proprietary
    hybrid_search: true
    filter_dialect: mongo-ish ($eq, $in)
    bulk_export: list ids + fetch in batches (no portable dump API)
    id_type: str
    default_port: null
    env_vars: [PINECONE_API_KEY]
    scale: billion
    sweet_spot: "zero-ops managed canonical; polished UX, namespaces"
    docs:
      install: https://pypi.org/project/pinecone/
      python_client: https://sdk.pinecone.io/python/
      filtering: https://docs.pinecone.io/guides/data/filtering-with-metadata
      pricing: https://www.pinecone.io/pricing/
    verify_command: "python -c 'from pinecone import Pinecone; import os; print(Pinecone(api_key=os.environ[\"PINECONE_API_KEY\"]).list_indexes())'"
    notes: "Package renamed pinecone-client->pinecone at v5.1.0; v9 needs Python >=3.10. Do not install both."
    adapter: pinecone

  - name: mongodb
    display_name: MongoDB Atlas Vector Search
    archetype: managed
    deployment: [server, managed]
    requires_server: true
    embedded_mode: false
    managed_free_tier: true   # M0 512 MB permanent
    pip_packages: [pymongo]
    extras: null
    license: SSPLv1 (server)
    hybrid_search: true
    filter_dialect: MongoDB Query Language
    bulk_export: mongodump
    id_type: str
    default_port: 27017
    env_vars: [MONGODB_URI]
    scale: large
    sweet_spot: "you already have MongoDB; $vectorSearch in the aggregation pipeline"
    docs:
      install: https://www.mongodb.com/docs/atlas/atlas-vector-search/vector-search-quick-start/
      python_client: https://pymongo.readthedocs.io/
      filtering: https://www.mongodb.com/docs/atlas/atlas-vector-search/vector-search-stage/
      pricing: https://www.mongodb.com/pricing
    verify_command: "python -c 'import os; from pymongo import MongoClient; print(MongoClient(os.environ[\"MONGODB_URI\"]).admin.command(\"ping\"))'"
    notes: "A vector search index must be created in the Atlas UI / API before querying. M0 supports one vector index."
    adapter: mongodb

  - name: turbopuffer
    display_name: turbopuffer
    archetype: managed
    deployment: [managed]
    requires_server: false
    embedded_mode: false
    managed_free_tier: false
    pip_packages: [turbopuffer]
    extras: null
    license: Proprietary
    hybrid_search: true
    filter_dialect: typed attribute filters
