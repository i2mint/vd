    extras: null
    license: Proprietary
    hybrid_search: true
    filter_dialect: restrict + crowding tokens
    bulk_export: scroll/list and re-upsert
    id_type: str
    default_port: null
    env_vars: [GOOGLE_CLOUD_PROJECT, GOOGLE_APPLICATION_CREDENTIALS]
    scale: billion
    sweet_spot: "GCP-native ScaNN"
    docs:
      install: https://cloud.google.com/vertex-ai/docs/vector-search/overview
      python_client: https://cloud.google.com/python/docs/reference/aiplatform/latest
      filtering: https://cloud.google.com/vertex-ai/docs/vector-search/filtering
      pricing: https://cloud.google.com/vertex-ai/pricing
    verify_command: null
    notes: "Per-node-hour billing for the deployed index endpoint (idle still costs)."
    adapter: null

  - name: azure_ai_search
    display_name: Azure AI Search
    archetype: managed
    deployment: [managed]
    requires_server: false
    embedded_mode: false
    managed_free_tier: true   # Free tier ~50 MB, one per subscription
    pip_packages: [azure-search-documents]
    extras: null
    license: Proprietary
    hybrid_search: true
    filter_dialect: OData filter
    bulk_export: scroll/list and re-upsert
    id_type: str
    default_port: null
    env_vars: [AZURE_SEARCH_ENDPOINT, AZURE_SEARCH_API_KEY]
    scale: large
    sweet_spot: "Azure-native, integrated vectorization + semantic ranker"
    docs:
      install: https://learn.microsoft.com/en-us/azure/search/vector-search-overview
      python_client: https://learn.microsoft.com/en-us/python/api/overview/azure/search-documents-readme
