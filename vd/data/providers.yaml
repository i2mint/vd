    filter_dialect: SQL WHERE
    bulk_export: pg_dump
    id_type: int-or-str
    default_port: 5432
    env_vars: [DATABASE_URL]
    scale: large
    sweet_spot: "pgvector at 10-100M+ scale, cheaper RAM (RaBitQ + hierarchical k-means)"
    docs:
