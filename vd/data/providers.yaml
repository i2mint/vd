    id_type: str
    default_port: null
    env_vars: [TURBOPUFFER_API_KEY]
    scale: billion
    sweet_spot: "10-100x cheaper, object-storage-backed; huge-but-bursty workloads"
    docs:
      install: https://pypi.org/project/turbopuffer/
      python_client: https://turbopuffer.com/docs
      filtering: https://turbopuffer.com/docs/query
      pricing: https://turbopuffer.com/pricing
    verify_command: "python -c 'import os; from turbopuffer import Turbopuffer; print(Turbopuffer(region=\"gcp-us-central1\", api_key=os.environ[\"TURBOPUFFER_API_KEY\"]).namespaces())'"
    notes: "Region-pinned (e.g. gcp-us-central1). Stable v2.x."
    adapter: turbopuffer

  - name: vertex_ai
    display_name: Vertex AI Vector Search
    archetype: managed
    deployment: [managed]
    requires_server: false
    embedded_mode: false
    managed_free_tier: false   # $300 GCP credit for new accounts
