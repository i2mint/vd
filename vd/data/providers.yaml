    default_port: 9200
    env_vars: [OPENSEARCH_URL]
    scale: large
    sweet_spot: "AWS-native Elasticsearch fork, vector capable, Apache-2.0"
    docs:
      install: https://opensearch.org/downloads.html
      python_client: https://opensearch.org/docs/latest/clients/python-low-level/
      filtering: https://opensearch.org/docs/latest/search-plugins/knn/
